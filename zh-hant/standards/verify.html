<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驗證證書 — 國際生命鑽石協會</title>
    <meta name="description" content="驗證 ILDA 溯源證書的真實性。輸入證書编號查看完整的監管链記錄。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/ilda.css">
    <style>
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', 'Georgia', serif;
        }
    </style>
</head>
<body>

    <div id="ilda-nav"></div>

    <div class="breadcrumb">
        <div class="container">
            <a href="../index.html">首頁</a>
            <span class="breadcrumb-sep">/</span>
            <a href="traceability.html">標準</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">驗證證書</span>
        </div>
    </div>

    <section class="page-hero">
        <div class="container">
            <h1>驗證證書</h1>
            <p>輸入您的 ILDA 證書编號以確認真實性並查看溯源記錄。</p>
        </div>
    </section>

    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="card" style="text-align: center; padding: 3rem;">
                <div style="margin-bottom: 2rem;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--ilda-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h2 style="margin-bottom: 1rem;">證書驗證</h2>
                <p style="margin-bottom: 2rem;">輸入在您 ILDA 溯源證書上找到的證書编號。</p>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <input type="text" placeholder="ILDA-2026-XXXX" style="flex: 1; padding: 1rem; border: 2px solid var(--ilda-border); border-radius: 4px; font-size: 1rem; font-family: inherit; text-align: center;">
                </div>
                <button class="btn btn-primary" style="width: 100%;">驗證證書</button>
                <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--ilda-gray);">
                    證書编號區分大小写。示例：<strong>ILDA-2026-001</strong>
                </p>
            </div>
        </div>
    </section>

    <section class="section section-light">
        <div class="container" style="max-width: 800px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">您将看到什麼</h2>
            <div class="grid-2">
                <div class="card">
                    <h3>證書详情</h3>
                    <p>證書编號、颁發日期、認證實驗室和有效状態。</p>
                </div>
                <div class="card">
                    <h3>溯源摘要</h3>
                    <p>來源类型、處理地点、合成日期和監管链檢查点。</p>
                </div>
            </div>
        </div>
    </section>

    <div id="ilda-footer"></div>

  <script src="/assets/js/ilda-nav.js"></script>
</body>
</html>
