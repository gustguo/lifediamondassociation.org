<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证证书 — 国际生命钻石协会</title>
    <meta name="description" content="验证 ILDA 溯源证书的真实性。输入证书编号查看完整的监管链记录。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/ilda.css">
    <style>
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', 'Georgia', serif;
        }
    </style>
</head>
<body>

    <div id="ilda-nav"></div>

    <div class="breadcrumb">
        <div class="container">
            <a href="../index.html">首頁</a>
            <span class="breadcrumb-sep">/</span>
            <a href="traceability.html">標準</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">验证证书</span>
        </div>
    </div>

    <section class="page-hero">
        <div class="container">
            <h1>验证证书</h1>
            <p>输入您的 ILDA 证书编号以确认真实性并查看溯源记录。</p>
        </div>
    </section>

    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="card" style="text-align: center; padding: 3rem;">
                <div style="margin-bottom: 2rem;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--ilda-gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h2 style="margin-bottom: 1rem;">证书验证</h2>
                <p style="margin-bottom: 2rem;">输入在您 ILDA 溯源证书上找到的证书编号。</p>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <input type="text" placeholder="ILDA-2026-XXXX" style="flex: 1; padding: 1rem; border: 2px solid var(--ilda-border); border-radius: 4px; font-size: 1rem; font-family: inherit; text-align: center;">
                </div>
                <button class="btn btn-primary" style="width: 100%;">验证证书</button>
                <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--ilda-gray);">
                    证书编号区分大小写。示例：<strong>ILDA-2026-001</strong>
                </p>
            </div>
        </div>
    </section>

    <section class="section section-light">
        <div class="container" style="max-width: 800px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">您将看到什么</h2>
            <div class="grid-2">
                <div class="card">
                    <h3>证书详情</h3>
                    <p>证书编号、颁发日期、认证实验室和有效状态。</p>
                </div>
                <div class="card">
                    <h3>溯源摘要</h3>
                    <p>来源类型、处理地点、合成日期和监管链检查点。</p>
                </div>
            </div>
        </div>
    </section>

    <div id="ilda-footer"></div>

  <script src="/assets/js/ilda-nav.js"></script>
</body>
</html>
